<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#050507" />
    <meta name="description" content="GAGOS — the voyaging mind: a local-first, supervised, memory-driven AI operating system." />
    <!-- ===== SECURITY HEADERS (C18) =====
         The Content-Security-Policy is injected by the gagos-csp vite plugin
         (vite.config.js) so it can be MODE-AWARE: the dev server must allow
         script 'unsafe-inline' for vite's React-refresh preamble, but the
         production build has no inline scripts (the boot loader is the external
         /boot-loader.js), so the built CSP drops 'unsafe-inline' entirely.
         A too-strict `script-src 'self'` previously blocked WASM + the troika
         worker + inline scripts and silently killed the 3D scene. -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" />
    <!-- Anti-flash: paint the OLED canvas before the bundle loads -->
    <style>
      html { background: #050507; }
      #root { min-height: 100vh; }

      /* ── Boot loader ──────────────────────────────────────────────────────
         Paints INSTANTLY (inline, before the heavy three.js bundle parses), so
         the first frame is a living mark instead of a white/black void. It is a
         sibling of #root (React only owns #root), so it survives until the app
         is ready. Dismissed on window 'load' (+grace), on a 'gagos:ready' event
         the scene can dispatch once shaders are warm, or a hard safety timeout.
         Pure CSS, no WebGL — works even if the 3D scene never mounts. */
      #boot-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 28px; background: #050507;
        opacity: 1; transition: opacity 650ms cubic-bezier(0.16, 1, 0.3, 1);
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #boot-loader[data-done] { opacity: 0; pointer-events: none; }
      .boot-orb {
        position: relative; width: 92px; height: 92px;
        display: grid; place-items: center;
      }
      .boot-orb__core {
        width: 16px; height: 16px; border-radius: 50%;
        background: #7bf5fb;
        box-shadow: 0 0 24px 6px rgba(123, 245, 251, 0.55), 0 0 60px 16px rgba(123, 245, 251, 0.18);
        animation: boot-breathe 2.4s ease-in-out infinite;
      }
      .boot-orb__ring {
        position: absolute; inset: 0; border-radius: 50%;
        border: 1px solid rgba(123, 245, 251, 0.14);
        border-top-color: rgba(123, 245, 251, 0.65);
        animation: boot-spin 1.8s linear infinite;
      }
      .boot-orb__ring--slow {
        inset: 14px; border-color: rgba(123, 245, 251, 0.08);
        border-left-color: rgba(123, 245, 251, 0.4);
        animation-duration: 3.2s; animation-direction: reverse;
      }
      .boot-label {
        font-size: 11px; letter-spacing: 0.34em; text-transform: uppercase;
        color: rgba(167, 171, 189, 0.7);
        animation: boot-fade 2.4s ease-in-out infinite;
      }
      @keyframes boot-breathe {
        0%, 100% { transform: scale(0.82); opacity: 0.65; }
        50%      { transform: scale(1.12); opacity: 1; }
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @keyframes boot-fade {
        0%, 100% { opacity: 0.45; }
        50%      { opacity: 0.9; }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-orb__core, .boot-orb__ring, .boot-orb__ring--slow, .boot-label { animation: none; }
        .boot-orb__core { transform: scale(1); opacity: 1; }
        #boot-loader { transition: none; }
      }
    </style>
    <!-- H7 FIX: Google Fonts preconnect removed — fonts are now self-hosted
         to eliminate Subresource Integrity (SRI) bypass via CDN. Loading external
         fonts from Google CDN without integrity hashes exposes the app to supply-
         chain attacks. Fonts are served from 'self' (see CSP font-src 'self'). -->
    <title>GAGOS — The Voyaging Mind</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- First paint: a breathing mark, not a void. Replaced by the app when ready. -->
    <div id="boot-loader" role="status" aria-live="polite" aria-label="Loading the voyaging mind">
      <div class="boot-orb" aria-hidden="true">
        <span class="boot-orb__ring"></span>
        <span class="boot-orb__ring boot-orb__ring--slow"></span>
        <span class="boot-orb__core"></span>
      </div>
      <div class="boot-label">waking the voyaging mind</div>
    </div>

    <noscript>
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050507;color:#a7abbd;font-family:system-ui,sans-serif;text-align:center;padding:24px;">
        <div style="max-width:30rem;">
          <h1 style="color:#f2f3f7;font-size:1.25rem;font-weight:600;margin:0 0 .5rem;">JavaScript required</h1>
          <p style="margin:0;line-height:1.6;">GAGOS is an interactive workspace and needs JavaScript enabled to run. Please enable it and reload.</p>
        </div>
      </div>
    </noscript>

    <script type="module" src="/src/main.jsx"></script>
    <!-- Boot-loader dismiss logic is EXTERNAL (served from 'self') so the CSP needs
         no script 'unsafe-inline' for it. -->
    <script src="/boot-loader.js"></script>
  </body>
</html>
