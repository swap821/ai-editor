# Local-first observability stack for the AI-OS API.
#
# The container binds to 0.0.0.0 inside the network, so the lifespan policy
# requires a non-empty AIOS_API_TOKEN of at least 32 characters. Set it in a
# .env file or in the environment before running:
#
#   AIOS_API_TOKEN=<32-char-token> docker compose up --build
#
name: aios

services:
  aios:
    build: .
    restart: unless-stopped
    # Conservative caps for a process that loads torch/sentence-transformers/
    # faiss-cpu: an unbounded OOM here can otherwise take down the whole host.
    # Tune from observed usage (`docker stats`) rather than raising blindly.
    mem_limit: 4g
    cpus: 2.0
    ports:
      - "127.0.0.1:${AIOS_API_PORT:-8000}:8000"
    environment:
      - AIOS_API_HOST=0.0.0.0
      - AIOS_API_PORT=8000
      - AIOS_API_TOKEN=${AIOS_API_TOKEN:-}
      - AIOS_DATA_DIR=/app/data
      - AIOS_PROFILE=${AIOS_PROFILE:-production}
      - AIOS_EXECUTOR_URL=http://executor:8081
      - AIOS_EXECUTOR_TOKEN=${AIOS_EXECUTOR_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    networks:
      - aios-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  executor:
    build:
      context: .
      dockerfile: Dockerfile.executor
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    # The mounted Docker socket is normally root:<docker-group>. Set this to
    # the host socket's numeric group id when it differs from the default.
    group_add:
      - "${AIOS_DOCKER_SOCKET_GID:-999}"
    environment:
      - AIOS_EXECUTOR_TOKEN=${AIOS_EXECUTOR_TOKEN:-}
      - AIOS_EXECUTOR_WORKSPACE_ROOT=/workspace/jobs
      - AIOS_CONTAINER_RUNTIME=docker
    expose:
      - "8081"
    volumes:
      # The control plane never receives this socket. The executor is the only
      # service allowed to request disposable worker containers.
      - ${AIOS_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ./data/executor-workspaces:/workspace/jobs
    networks:
      - aios-net
    command: ["python", "-m", "aios.executor_service"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "127.0.0.1:${AIOS_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - aios-net
    depends_on:
      aios:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "127.0.0.1:${AIOS_GATEWAY_PORT:-3000}:8080"
    networks:
      - aios-net
    depends_on:
      aios:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AIOS_GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${AIOS_GRAFANA_ADMIN_PASSWORD:?AIOS_GRAFANA_ADMIN_PASSWORD must be set}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana/dashboards/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/dashboard-provider.yml:ro
      - ./observability/grafana/dashboards/aios-dashboard.json:/etc/grafana/provisioning/dashboards/aios-dashboard.json:ro
      - grafana-data:/var/lib/grafana
    networks:
      - aios-net
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "127.0.0.1:${AIOS_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - aios-net
    depends_on:
      - prometheus

networks:
  aios-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
