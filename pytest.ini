[pytest]
# Restrict the bare `pytest` collection to the project's own test tree.
# ``training_ground/`` is a sandbox seed and may be deliberately broken during a
# BREATHE demonstration, so default suite collection stays on the project tests.
# Explicit `pytest tests/` and sandbox-local `pytest test_greeter.py` still work.
testpaths = tests
markers =
    fast: fast unit tests with no external I/O (default CI subset)
    slow: tests that touch the database or run heavier logic
    cloud: tests that require a cloud provider or network endpoint
addopts =
    -q
    --strict-markers
# Coverage is intentionally NOT in the global addopts. Enforcing --cov-fail-under
# here breaks focused test runs (they cover only a subset of the codebase). The
# full-suite coverage gate is applied in CI/.github/workflows/ci.yml and can be
# run locally with the explicit coverage flags shown there.
# To run a focused subset: python -m pytest tests/test_foo.py -q
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:google.rpc.*
