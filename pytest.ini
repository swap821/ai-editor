[pytest]
# Restrict the bare `pytest` collection to the project's own test tree.
# ``training_ground/`` is a sandbox seed and may be deliberately broken during a
# BREATHE demonstration, so default suite collection stays on the project tests.
# Explicit `pytest tests/` and sandbox-local `pytest test_greeter.py` still work.
testpaths = tests
markers =
    fast: fast unit tests with no external I/O (default CI subset)
    slow: tests that touch the database or run heavier logic
    cloud: tests that require a cloud provider or network endpoint
addopts =
    -q
    --strict-markers
    --cov=aios
    --cov-report=term-missing
    --cov-fail-under=0
# Coverage is MEASURED on every local run (operator decision, 2026-06-29) so the
# coverage truth is visible locally, not only in CI. The GATE is deliberately
# decoupled from the measurement: --cov-fail-under=0 means a FOCUSED run (which
# exercises only a slice of aios/) reports its number but never FALSE-fails. The
# real 85% floor is applied by CI (.github/workflows/ci.yml), whose explicit
# --cov-fail-under=85 on the command line overrides the 0 above — so the full-suite
# gate is still enforced on every push/PR. Run that same gate locally by appending
# --cov-fail-under=85 (e.g. python -m pytest --cov-fail-under=85).
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:google.rpc.*
