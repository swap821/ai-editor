name: CI

# Cross-suite CI gate: backend pytest with coverage floor + marker discipline,
# frontend typecheck + unit tests + production build. Mirrors AGENTS.md.
# pytest.ini enforces strict markers (fast / slow / cloud); this workflow runs
# the full suite on every push/PR and applies the --cov-fail-under=85 gate.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    # windows-latest reproduces the project's known-green dev platform
    # (the 1 documented skip is the Windows symlink-privilege case).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install radon

      - name: Run test suite with coverage gate
        run: python -m pytest -q --cov=aios --cov-report=term-missing --cov-report=xml --cov-fail-under=85

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
