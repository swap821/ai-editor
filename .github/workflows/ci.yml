name: CI

# Cross-suite CI gate: backend pytest with coverage floor + marker discipline,
# frontend typecheck + unit tests + production build. Mirrors AGENTS.md.
# pytest.ini enforces strict markers (fast / slow / cloud); this workflow runs
# the full suite on every push/PR and applies the --cov-fail-under=85 gate.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Kept in lockstep with Dockerfile's `FROM python:3.12-slim` and the
          # repo-root .python-version pin - the coverage-gated suite must run
          # on the same interpreter the container ships (matters for the
          # C-extension-heavy stack: torch/faiss-cpu/numpy).
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install radon pip-audit

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Run test suite with coverage gate
        run: python -m pytest -q --cov=aios --cov-report=term-missing --cov-report=xml --cov-fail-under=85

  backend:
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Backend matrix gate
        run: echo "Backend tests passed on all platforms"

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Enforce monotonic frontend warning budget
        run: |
          ./node_modules/.bin/eslint . --format json > /tmp/gagos-eslint-report.json
          node ../scripts/check_frontend_warning_budget.mjs /tmp/gagos-eslint-report.json

      - name: Unit tests + coverage
        # Runs the suite AND measures coverage, enforcing the per-directory
        # floors in vite.config.js (src/superbrain/lib, src/workbench). Coverage
        # was previously only available locally via `npm run test:coverage`;
        # this makes the floors an actual CI gate, not an honor-system dial.
        run: npm run test:coverage

      - name: Production build
        run: npm run build

  frontend:
    needs: frontend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Frontend gate
        run: echo "Frontend tests and build passed"

  release-authority:
    # This job is intentionally separate from the platform matrix: it checks
    # the shipped topology and architecture invariants once on Linux, where
    # the production container toolchain is available.
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend and release tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-licenses ruff==0.9.10

      - name: Tracked-source secret scan
        run: python scripts/security_scan.py

      - name: Compile and architecture conformance
        run: |
          python -m compileall -q aios tests scripts
          python -m pytest -q -o addopts='' \
            tests/test_release_conformance.py \
            tests/test_launcher.py \
            tests/test_governance.py \
            tests/test_v1_declaration.py \
            tests/test_route_registry_conformance.py \
            tests/test_operations.py \
            tests/test_executor_service.py \
            tests/test_deployment_hardening.py

      - name: Ruff check and format gate
        run: |
          ruff check \
            aios/operations aios/application/governance \
            aios/application/executor aios/infrastructure/executor \
            aios/executor_service.py aios/launcher.py \
            scripts/security_scan.py scripts/generate_sbom.py \
            tests/test_release_conformance.py tests/test_launcher.py \
            tests/test_governance.py tests/test_v1_declaration.py \
            tests/test_operations.py \
            tests/test_executor_service.py tests/test_executor_client.py \
            tests/test_executor_integration.py tests/test_runtime_worker_container.py
          ruff format --check \
            scripts/security_scan.py scripts/generate_sbom.py \
            tests/test_release_conformance.py tests/test_launcher.py \
            tests/test_governance.py tests/test_v1_declaration.py \
            tests/test_operations.py tests/test_executor_service.py \
            tests/test_executor_client.py tests/test_executor_integration.py \
            tests/test_runtime_worker_container.py \
            aios/executor_service.py aios/launcher.py \
            aios/application/governance aios/application/executor \
            aios/infrastructure/executor

      - name: Validate production Compose topology
        env:
          AIOS_API_TOKEN: "ci-production-token-012345678901234567890123"
          AIOS_EXECUTOR_TOKEN: "ci-executor-token-012345678901234567"
          AIOS_EXECUTOR_HOST_WORKSPACE_ROOT: "${{ github.workspace }}/data/executor-workspaces"
          AIOS_GRAFANA_ADMIN_PASSWORD: "ci-grafana-password"
        run: docker compose config --quiet

      - name: Start private Executor Service topology
        env:
          AIOS_API_TOKEN: "ci-production-token-012345678901234567890123"
          AIOS_EXECUTOR_TOKEN: "ci-executor-token-012345678901234567"
          AIOS_EXECUTOR_HOST_WORKSPACE_ROOT: "${{ github.workspace }}/data/executor-workspaces"
          AIOS_GRAFANA_ADMIN_PASSWORD: "ci-grafana-password"
          AIOS_PROFILE: production
        run: |
          touch .env
          # Both services intentionally run as UID 65534. The checkout-owned
          # bind mount must therefore be writable before the control-plane
          # probe stages its disposable workspace.
          mkdir -p data/executor-workspaces
          chmod 0777 data data/executor-workspaces
          export AIOS_DOCKER_SOCKET_GID="$(stat -c '%g' /var/run/docker.sock)"
          export AIOS_EXECUTOR_HOST_WORKSPACE_ROOT="$(pwd)/data/executor-workspaces"
          # Keep only the lightweight privileged service resident. The
          # control-plane proof below runs as a one-shot container so CI does
          # not need a second Python interpreter inside the live API process.
          docker compose up -d --build --wait executor

      - name: Report private Executor Service state
        if: ${{ always() }}
        env:
          AIOS_API_TOKEN: "ci-production-token-012345678901234567890123"
          AIOS_EXECUTOR_TOKEN: "ci-executor-token-012345678901234567"
          AIOS_EXECUTOR_HOST_WORKSPACE_ROOT: "${{ github.workspace }}/data/executor-workspaces"
          AIOS_GRAFANA_ADMIN_PASSWORD: "ci-grafana-password"
        run: |
          docker compose ps
          docker compose logs --no-color --tail=80 executor

      - name: Prove private Executor Service isolation
        env:
          AIOS_API_TOKEN: "ci-production-token-012345678901234567890123"
          AIOS_EXECUTOR_TOKEN: "ci-executor-token-012345678901234567"
          AIOS_EXECUTOR_HOST_WORKSPACE_ROOT: "${{ github.workspace }}/data/executor-workspaces"
          AIOS_GRAFANA_ADMIN_PASSWORD: "ci-grafana-password"
          AIOS_PROFILE: production
        run: |
          export AIOS_EXECUTOR_HOST_WORKSPACE_ROOT="$(pwd)/data/executor-workspaces"
          docker compose run --rm --no-deps --use-aliases --build \
            -e AIOS_EXECUTOR_INTEGRATION=1 aios \
            python -m pytest -q -o addopts= tests/test_executor_integration.py

      - name: Tear down private Executor Service topology
        if: ${{ always() }}
        env:
          AIOS_API_TOKEN: "ci-production-token-012345678901234567890123"
          AIOS_EXECUTOR_TOKEN: "ci-executor-token-012345678901234567"
          AIOS_EXECUTOR_HOST_WORKSPACE_ROOT: "${{ github.workspace }}/data/executor-workspaces"
          AIOS_GRAFANA_ADMIN_PASSWORD: "ci-grafana-password"
        run: docker compose down -v --remove-orphans

      - name: Generate source manifest SBOM
        run: python scripts/generate_sbom.py --output sbom.cdx.json

      - name: Generate dependency license inventory
        run: pip-licenses --format=json > license-report.json

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: gagos-release-evidence
          path: |
            sbom.cdx.json
            license-report.json
