global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "aios"
    static_configs:
      - targets:
          - aios:8000
    metrics_path: /metrics
    scrape_interval: 15s
